<button id="btn-top" aria-label="맨 위로">↑</button>
<script>
  var b=document.getElementById('btn-top');
  window.addEventListener('scroll',function(){b.classList.toggle('visible',window.scrollY>300);});
  b.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
</script>
<script>
(function(){
  var toc=document.getElementById('toc-toggle');
  var sidebar=document.querySelector('.sidebar');
  var back=document.querySelector('.mobile-back');
  var path=location.pathname;
  var isIndex=/index\.html$/.test(path)||path==='/'||/\/$/.test(path);
  if(toc&&!sidebar)toc.style.display='none';
  if(back&&isIndex)back.style.display='none';
  if(!toc||!sidebar)return;
  var ov=document.createElement('div');
  ov.className='sidebar-overlay';
  document.body.appendChild(ov);
  function closeDrawer(){document.body.classList.remove('sidebar-open');}
  toc.addEventListener('click',function(){document.body.classList.toggle('sidebar-open');});
  ov.addEventListener('click',closeDrawer);
})();
</script>
